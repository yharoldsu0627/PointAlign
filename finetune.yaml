model:
  arch: minigpt_3d
  model_type: pretrain
  max_txt_len: 1024
  end_sym: "###"
  llama_model: "./params_weight/Phi_2"
  ckpt: './params_weight/pointalign/pretrain.pth'  # 从Stage III加载
  use_grad_checkpoint: True
  chat_template: True
  lora_r: 64
  lora_alpha: 16
  pc_linear_layer: 2
  QFormer_lora_r: 8
  QFormer_lora_alpha: 16
  train_QFormer_norm: True
  QFormer_lora_module: ["query", "key", "value"]
  freeze_Qformer: True
  align_qformer_to_llm: True

datasets:
  Objaverse_detailed:
    batch_size: 6
    text_processor:
      train:
        name: "blip_caption"
    sample_ratio: 2

  Objaverse_single_round:
    batch_size: 10
    text_processor:
      train:
        name: "blip_caption"
    sample_ratio: 3

  Objaverse_mutil_round:
    batch_size: 4
    text_processor:
      train:
        name: "blip_caption"
    sample_ratio: 3

run:
  task: image_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 3e-6
  min_lr: 1e-7
  warmup_lr: 1e-7
  weight_decay: 0.05
  num_workers: 12
  max_epoch: 1
  warmup_steps: 1000
  iters_per_epoch: 10000
  seed: 42
  output_dir: "./output"
  amp: True
  resume_ckpt_path: null
  evaluate: False
  train_splits: ["train"]
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
  wandb_log: False
  job_name: finetune
